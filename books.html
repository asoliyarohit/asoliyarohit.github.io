<main>
  <section id="books">
    <div class="container">
      <h2 class="section-title"><span class="cyan">05.</span> Reading</h2>
      <p class="shelf-hint">// click a book to open it</p>
      <div class="bookshelf-wrap">
        <div class="bookshelf" id="bookshelf"><!-- filled by content/books.json --></div>
        <div class="shelf-plank"></div>
      </div>
    </div>
  </section>
</main>

<!-- Book reader modal (shared across all books) -->
<div class="reader-overlay" id="readerOverlay">
  <button class="reader-close" id="readerClose" aria-label="Close">&#x2715;</button>
  <div class="open-book" id="openBook">

    <!-- Left page: fixed cover info -->
    <div class="book-left-page" id="bookLeftPage">
      <!-- rendered by JS when a book is opened -->
    </div>

    <!-- Binding -->
    <div class="book-binding"></div>

    <!-- Right page: 3-page content with flip animation -->
    <div class="book-right-page">
      <div class="page-flipper" id="pageFlipper">
        <div class="page-face page-front" id="pageFront"></div>
        <div class="page-face page-back"  id="pageBack"></div>
      </div>
    </div>

  </div>

  <div class="reader-controls">
    <button id="btnPrev" disabled>&#9666; Prev</button>
    <span id="pageIndicator">1 / 3</span>
    <button id="btnNext">Next &#9656;</button>
  </div>
</div>
